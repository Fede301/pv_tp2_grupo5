<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 17</title>
</head>
<body>
    <h1>Ejercicio 17</h1>
    <script>
        const contarLetraA = (texto) => {
            let contador = 0;

            for (let i = 0; i < texto.length; i++) {
                if (texto[i] === "a" || texto[i] === "A") {    
                    contador++;
                }
            }
            return contador;
        };
        let palabra = prompt("Ingrese una palabra o frase");
        let cantidad = contarLetraA(palabra);

        document.write(`La letra "a" aparece ${cantidad} veces`);
    </script>

</body>
</html>
