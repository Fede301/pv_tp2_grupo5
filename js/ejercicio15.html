<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let nummes;
        nummes = parseInt(prompt("ingrese un numero "))

        const retornarmes = (num) => {
            switch (num) {
                case 1: document.write("este numero pertence a enero");
                    break;
                case 2: document.write("este numero pertenece a febrero");
                    break;
                case 3:
                    document.write("este numero pertenece a marzo");
                    break;
                case 4:
                    document.write("este numero pertenece a abril");
                    break;
                case 5:
                    document.write("este numero pertenece a mayo");
                    break;
                case 6:
                    document.write("este numero pertenece a junio");
                    break;
                case 7:
                    document.write("este numero pertenece a julio");
                    break;
                case 8:
                    document.write("este numero pertenece a agosto");
                    break;
                case 9:
                    document.write("este numero pertenece a septiembre");
                    break;
                case 10:
                    document.write("este numero pertenece a octubre");
                    break;
                case 11:
                    document.write("este numero pertenece a noviembre");
                    break;
                case 12:
                    document.write("este numero pertenece a diciembre");
                    break;
                default:
                    document.write("este numero no corresponde a ningún mes");
                    break;
            }
        }
        //invocar funcion
        retornarmes(nummes);

    </script>
</body>

</html>
