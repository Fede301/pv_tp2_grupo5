<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 10</title>
</head>
<body>
    <script>
        const cantidad = parseInt(prompt("Ingrese la cantidad de numeros a pedir:"));
        const numeros = [];
        let suma = 0;
        for (let i = 0; i < cantidad; i++) {
            let num = parseInt(prompt(`Ingrese el numero ${i + 1}`));
            numeros.push(num);
            suma += num;
        }
        const promedio = suma / cantidad;
        document.write(`Los numeros ingresados son: ${numeros.join(",")} <br>`);
        document.write(`El promedio de los numero ingresados es: ${promedio.toFixed(2)}`);
    </script>
    
</body>
</html>
